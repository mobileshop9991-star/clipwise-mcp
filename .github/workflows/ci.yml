name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and smoke-test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test — list tools via MCP protocol
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | timeout 5 node dist/index.js > out.txt || true
          cat out.txt
          grep -q "clipwise_get_info" out.txt
          grep -q "clipwise_get_use_cases" out.txt
          grep -q "clipwise_search_trends" out.txt

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t clipwise-mcp-server:ci .
      - name: Verify image starts
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | timeout 5 docker run -i --rm clipwise-mcp-server:ci > out.txt || true
          cat out.txt
          grep -q "clipwise" out.txt
